 <!DOCTYPE html>                                                                 
  <html lang="en">                                                                
  <head>                                                                          
    <meta charset="UTF-8" />                                
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />    
    <title>Elizabeth's Disturbing Movie Habit</title>                             
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600
  ;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />  
    <style>                                                 
      * { box-sizing: border-box; margin: 0; padding: 0; }                        
                                                                                  
      body {                                                                    
        background-color: #111111;                                                
        color: #f0eaea;                                     
        font-family: 'Lora', Georgia, serif;                                      
        font-size: 16px;
        min-height: 100vh;                                                        
      }                                                                           
                                                                                
      header {                                                                    
        background: linear-gradient(180deg, #1c1c1c 0%, #111111 100%);
        border-bottom: 2px solid #c0282a;                                         
        padding: 2rem 2rem 1.5rem;
        text-align: center;                                                       
      }                                                     
                                                                                  
      header h1 {                                           
        font-family: 'Playfair Display', Georgia, serif;                        
        font-size: 2.6rem;
        font-weight: 700;                                                         
        color: #ffffff;
        letter-spacing: 0.02em;                                                   
        text-shadow: 0 2px 24px rgba(192,40,42,0.6), 0 0 60px rgba(192,40,42,0.2);
      }                                                                           
   
      header p.tagline {                                                          
        color: #c0282a;                                     
        font-style: italic;                                                       
        margin-top: 0.5rem;                                 
        font-size: 1rem;                                                        
        letter-spacing: 0.1em;                                                    
      }
                                                                                  
      .stats-bar {                                          
        display: flex;                                                          
        justify-content: center;                                                  
        gap: 2.5rem;
        background: #0d0d0d;                                                      
        border-bottom: 1px solid #2a2a2a;                   
        padding: 1rem 2rem;                                                       
        flex-wrap: wrap;
      }                                                                           
                                                            
      .stat { text-align: center; }                                               
                                                            
      .stat-value {                                                             
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 1.8rem;                                                        
        color: #c0282a;
      }                                                                           
                                                            
      .stat-label {                                                             
        font-size: 0.72rem;
        text-transform: uppercase;                                                
        letter-spacing: 0.12em;
        color: #888;                                                              
        margin-top: 0.15rem;                                
      }                                                                           
   
      .toolbar {                                                                  
        display: flex;                                      
        align-items: center;                                                    
        gap: 1rem;
        padding: 1.25rem 2rem;
        background: #161616;                                                      
        border-bottom: 1px solid #262626;
        flex-wrap: wrap;                                                          
      }                                                     
                                                                                
      .toolbar label {
        font-size: 0.82rem;
        color: #aaa;                                                              
        text-transform: uppercase;
        letter-spacing: 0.08em;                                                   
      }                                                     
                                                                                
      .toolbar select {                                                           
        background: #1e1e1e;
        color: #f0eaea;                                                           
        border: 1px solid #3a3a3a;                          
        border-radius: 4px;                                                       
        padding: 0.4rem 0.75rem;
        font-family: 'Lora', Georgia, serif;                                      
        font-size: 0.9rem;                                                        
        cursor: pointer;                                                        
      }                                                                           
                                                            
      .toolbar select:focus { outline: none; border-color: #c0282a; }             
      .spacer { flex: 1; }
                                                                                  
      .btn-add {                                                                  
        background: #c0282a;                                                    
        color: #ffffff;                                                           
        border: none;                                       
        border-radius: 6px;                                                     
        padding: 0.55rem 1.4rem;
        font-family: 'Lora', Georgia, serif;                                      
        font-size: 0.95rem;
        font-weight: bold;                                                        
        cursor: pointer;                                                          
        letter-spacing: 0.06em;                                                 
        transition: background 0.2s;                                              
      }                                                     
                                                                                
      .btn-add:hover { background: #d93535; }                                     
   
      .grid {                                                                     
        display: grid;                                      
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));           
        gap: 1.5rem;                                                              
        padding: 2rem;
      }                                                                           
                                                            
      .empty-state {                                                              
        grid-column: 1 / -1;
        text-align: center;                                                       
        color: #555;                                        
        padding: 4rem 1rem;                                                     
        font-size: 1.1rem;                                                        
        font-style: italic;
      }                                                                           
                                                            
      .card {                                                                   
        background: #1a1a1a;
        border: 1px solid #2e2e2e;
        border-radius: 10px;                                                      
        padding: 1.25rem 1.4rem 1rem;
        display: flex;                                                            
        flex-direction: column;                             
        gap: 0.65rem;                                                             
        position: relative;                                 
        transition: transform 0.15s, box-shadow 0.15s;                            
      }
                                                                                  
      .card:hover {                                         
        transform: translateY(-3px);                                            
        box-shadow: 0 8px 32px rgba(192,40,42,0.2);                               
        border-color: #4a2020;
      }                                                                           
                                                            
      .card-header {                                                              
        display: flex;                                      
        justify-content: space-between;                                         
        align-items: flex-start;
        gap: 0.5rem;
      }                                                                           
   
      .card-title {                                                               
        font-family: 'Lora', Georgia, serif;                
        font-size: 1.1rem;                                                      
        font-weight: bold;
        color: #ffffff;                                                           
        line-height: 1.3;
      }                                                                           
                                                            
      .card-year {                                                              
        font-size: 0.8rem;
        color: #888;                                                              
        white-space: nowrap;
        margin-top: 0.15rem;                                                      
        font-style: italic;                                                       
      }                                                                         
                                                                                  
      .card-meta {                                          
        display: flex;                                                          
        align-items: center;
        gap: 0.6rem;
        flex-wrap: wrap;                                                          
      }
                                                                                  
      .badge {                                              
        font-size: 0.7rem;                                                      
        text-transform: uppercase;
        letter-spacing: 0.07em;
        border-radius: 4px;                                                       
        padding: 0.2rem 0.55rem;
        font-weight: bold;                                                        
        font-family: 'Lora', Georgia, serif;                                      
      }                                                                         
                                                                                  
      .badge-genre { background: #222; color: #ccc; border: 1px solid #3a3a3a; }  
      .badge-watched { background: #1e0e0e; color: #e05555; border: 1px solid   
  #5a2020; }                                                                      
      .badge-want { background: #1e1e1e; color: #c0282a; border: 1px solid
  #4a2020; }                                                                      
      .stars { color: #c0282a; font-size: 1rem; letter-spacing: 0.05em; }
      .stars .empty { color: #333; }                                              
                                                            
      .card-note {                                                                
        font-size: 0.88rem;                                 
        color: #aaa;                                                              
        font-style: italic;                                 
        line-height: 1.6;                                                       
        border-top: 1px solid #282828;                                            
        padding-top: 0.6rem;
      }                                                                           
                                                            
      .card-actions {                                                             
        display: flex;                                      
        gap: 0.5rem;                                                            
        justify-content: flex-end;
        margin-top: 0.25rem;
      }                                                                           
   
      .btn-sm {                                                                   
        background: none;                                   
        border: 1px solid #333;                                                 
        border-radius: 4px;                                                       
        color: #888;
        font-family: 'Lora', Georgia, serif;                                      
        font-size: 0.75rem;                                                       
        padding: 0.25rem 0.65rem;                                               
        cursor: pointer;                                                          
        transition: color 0.15s, border-color 0.15s;        
      }                                                                           
   
      .btn-sm:hover { color: #f0eaea; border-color: #888; }                       
      .btn-sm.danger:hover { color: #e05555; border-color: #e05555; }
                                                                                  
      .modal-overlay {                                                            
        display: none;                                                          
        position: fixed;                                                          
        inset: 0;                                           
        background: rgba(0,0,0,0.88);                                           
        z-index: 100;                                                             
        align-items: center;
        justify-content: center;                                                  
        padding: 1rem;                                      
      }                                                                           
   
      .modal-overlay.open { display: flex; }                                      
                                                            
      .modal {                                                                  
        background: #1a1a1a;
        border: 1px solid #3a3a3a;                                                
        border-radius: 12px;
        padding: 2rem;                                                            
        width: 100%;                                        
        max-width: 480px;                                                         
        max-height: 90vh;
        overflow-y: auto;                                                         
      }                                                     
                                                                                
      .modal h2 {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 1.4rem;                                                        
        color: #ffffff;
        margin-bottom: 1.5rem;                                                    
        border-bottom: 1px solid #c0282a;                   
        padding-bottom: 0.6rem;                                                   
      }
                                                                                  
      .form-group { margin-bottom: 1.1rem; }                                      
                                                                                
      .form-group label {                                                         
        display: block;                                     
        font-size: 0.85rem;                                                     
        color: #aaa;                                                              
        text-transform: uppercase;
        letter-spacing: 0.08em;                                                   
        margin-bottom: 0.35rem;                             
      }                                                                         

      .form-group input,                                                          
      .form-group select,
      .form-group textarea {                                                      
        width: 100%;                                        
        background: #111;                                                       
        color: #f0eaea;
        border: 1px solid #333;                                                   
        border-radius: 6px;
        padding: 0.55rem 0.8rem;                                                  
        font-size: 0.95rem;                                                       
        font-family: 'Lora', Georgia, serif;                                    
        transition: border-color 0.2s;                                            
      }                                                                           
                                                                                
      .form-group input:focus,                                                    
      .form-group select:focus,                             
      .form-group textarea:focus { outline: none; border-color: #c0282a; }      
      .form-group textarea { resize: vertical; min-height: 80px; }                
      .star-input { display: flex; gap: 0.3rem; font-size: 1.6rem; }
                                                                                  
      .star-input span {                                    
        cursor: pointer;                                                          
        color: #333;                                        
        transition: color 0.1s;                                                 
        user-select: none;
      }                                                                           
   
      .star-input span.on { color: #c0282a; }                                     
                                                            
      .form-actions {                                                             
        display: flex;
        gap: 0.75rem;                                                             
        justify-content: flex-end;                          
        margin-top: 1.5rem;                                                     
      }                                                                           
   
      .btn-cancel {                                                               
        background: none;                                   
        border: 1px solid #444;                                                 
        color: #aaa;
        border-radius: 6px;
        padding: 0.5rem 1.2rem;                                                   
        font-family: 'Lora', Georgia, serif;
        font-size: 0.9rem;                                                        
        cursor: pointer;                                    
        transition: border-color 0.2s, color 0.2s;                                
      }
                                                                                  
      .btn-cancel:hover { border-color: #c0282a; color: #f0eaea; }                
                                                                                
      .btn-save {                                                                 
        background: #c0282a;                                
        color: #ffffff;                                                         
        border: none;
        border-radius: 6px;
        padding: 0.5rem 1.4rem;                                                   
        font-family: 'Lora', Georgia, serif;
        font-size: 0.9rem;                                                        
        font-weight: bold;                                  
        cursor: pointer;                                                          
        transition: background 0.2s;
      }                                                                           
                                                            
      .btn-save:hover { background: #d93535; }                                  

      .disturb-tag-section { margin-bottom: 0.75rem; }                            
   
      .disturb-tag-section-label {                                                
        font-size: 0.75rem;                                 
        text-transform: uppercase;                                                
        letter-spacing: 0.1em;                              
        color: #c0282a;                                                           
        margin-bottom: 0.4rem;
        padding-bottom: 0.2rem;                                                   
        border-bottom: 1px solid #2a2a2a;                                         
      }                                                                         
                                                                                  
      .disturb-tag-grid { display: flex; flex-wrap: wrap; gap: 0.4rem; }          
                                                                                
      .disturb-tag-btn {                                                          
        background: #1a1a1a;                                
        border: 1px solid #3a3a3a;                                              
        border-radius: 20px;                                                      
        color: #888;
        font-family: 'Lora', Georgia, serif;                                      
        font-size: 1rem;                                                          
        padding: 0.25rem 0.7rem;                                                
        cursor: pointer;                                                          
        transition: all 0.15s;                                                    
        user-select: none;                                                      
      }                                                                           
                                                            
      .disturb-tag-btn:hover { border-color: #c0282a; color: #f0eaea; }           
      .disturb-tag-btn.selected { background: #3a0e0e; border-color: #c0282a;
  color: #f0eaea; }                                                               
                                                            
      .disturb-level-picker {                                                     
        display: flex;                                      
        flex-direction: column;                                                   
        gap: 0.3rem;
        margin-top: 0.25rem;                                                      
      }                                                     
                                                                                
      .disturb-level-btn {                                                        
        display: flex;
        align-items: center;                                                      
        gap: 0.75rem;                                       
        width: 100%;                                                            
        background: #1a1a1a;
        border: 1px solid #3a3a3a;                                                
        border-radius: 6px;
        color: #888;                                                              
        font-family: 'Lora', Georgia, serif;                
        font-size: 0.9rem;                                                        
        padding: 0.5rem 0.85rem;
        cursor: pointer;                                                          
        transition: all 0.15s;                              
        text-align: left;                                                         
      }
                                                                                  
      .disturb-level-btn:hover { border-color: #c0282a; color: #f0eaea;           
  background: #221010; }                                                        
      .disturb-level-btn.selected { background: #3a0e0e; border-color: #c0282a;   
  color: #ffffff; }                                                               
                                                                                
      .disturb-level-btn .lvl-num {                                               
        font-family: 'Playfair Display', Georgia, serif;    
        font-size: 0.85rem;                                                       
        color: #c0282a;
        min-width: 1.1rem;                                                        
        text-align: center;                                                       
      }                                                                         
                                                                                  
      .disturb-level-btn.selected .lvl-num { color: #ff6666; }                    
      .disturb-level-desc { display: none; }                                    
                                                                                  
      .card-disturb {                                                             
        display: flex;                                                          
        align-items: center;                                                      
        gap: 0.6rem;                                        
        background: #1e0a0a;                                                    
        border: 1px solid #4a1515;                                                
        border-radius: 6px;
        padding: 0.5rem 0.75rem;                                                  
        margin: 0.1rem 0;                                   
      }                                                                           
                                                            
      .disturb-skull { color: #c0282a; font-size: 1.1rem; line-height: 1; }       
                                                            
      .disturb-level-label {                                                      
        color: #e05555;                                     
        font-weight: bold;                                                        
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 1rem;                                                          
        white-space: nowrap;                                                      
      }                                                                         
                                                                                  
      .disturb-level-desc-card { color: #b08080; font-style: italic; font-size:   
  0.9rem; }                                                                     
                                                                                  
      .card-trigger-warning {                                                     
        background: #2a0a0a;                                                    
        border: 1px solid #8b1a1a;                                                
        border-radius: 6px;                                                       
        padding: 0.4rem 0.75rem;                                                
        font-size: 0.82rem;                                                       
        color: #e05555;                                                           
        font-style: italic;                                                     
      }                                                                           
                                                            
      .card-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; }                
   
      .tag-pill {                                                                 
        background: #2a0a0a;                                
        border: 1px solid #4a1515;                                              
        border-radius: 20px;                                                      
        color: #cc7070;
        font-size: 0.68rem;                                                       
        padding: 0.15rem 0.55rem;                                                 
        font-style: italic;                                                     
      }                                                                           
                                                            
      .trigger-bar {                                                              
        background: #140808;
        border-bottom: 1px solid #3a1010;                                         
        padding: 0 2rem;                                                          
        overflow: hidden;                                                       
        max-height: 0;                                                            
        transition: max-height 0.3s ease, padding 0.3s ease;
      }                                                                           
   
      .trigger-bar.open { max-height: 600px; padding: 1.25rem 2rem; }             
                                                            
      .trigger-bar-header {                                                       
        display: flex;                                      
        align-items: center;                                                    
        justify-content: space-between;                                           
        margin-bottom: 1rem;
      }                                                                           
                                                            
      .trigger-bar-header h3 {                                                    
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 1rem;                                                          
        color: #e05555;                                     
      }                                                                         

      .trigger-bar-header p { font-size: 0.85rem; color: #888; font-style: italic;
   }
                                                                                  
      .btn-trigger-toggle {                                                       
        background: none;                                                       
        border: 1px solid #4a1515;                                                
        border-radius: 6px;                                 
        color: #c0282a;                                                         
        font-family: 'Lora', Georgia, serif;
        font-size: 0.85rem;                                                       
        padding: 0.35rem 0.9rem;
        cursor: pointer;                                                          
        transition: all 0.15s;                                                    
        white-space: nowrap;                                                    
      }                                                                           
                                                            
      .btn-trigger-toggle:hover,                                                
      .btn-trigger-toggle.active { background: #3a0e0e; border-color: #c0282a;
  color: #fff; }                                                                  
   
      ::-webkit-scrollbar { width: 6px; }                                         
      ::-webkit-scrollbar-track { background: #111; }       
      ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }         
      ::-webkit-scrollbar-thumb:hover { background: #555; } 
    </style>                                                                      
  </head>
  <body>                                                                          
                                                            
    <header>                                                                    
      <h1>Elizabeth's Disturbing Movie Habit 🎬</h1>
      <p class="tagline">A personal cinema journal</p>                            
    </header>
                                                                                  
    <div class="stats-bar">                                 
      <div class="stat">                                                          
        <div class="stat-value" id="stat-total">0</div>     
        <div class="stat-label">Total Tracked</div>                             
      </div>                                                                      
      <div class="stat">
        <div class="stat-value" id="stat-watched">0</div>                         
        <div class="stat-label">Watched</div>                                     
      </div>                                                                    
      <div class="stat">                                                          
        <div class="stat-value" id="stat-want">0</div>      
        <div class="stat-label">Want to Watch</div>                             
      </div>                                                                      
      <div class="stat">
        <div class="stat-value" id="stat-avg">—</div>                             
        <div class="stat-label">Avg Rating</div>                                  
      </div>                                                                    
    </div>                                                                        
                                                            
    <div class="toolbar">                                                       
      <label for="filter-status">Status:</label>
      <select id="filter-status">                                                 
        <option value="all">All</option>
        <option value="Want to Watch">Want to Watch</option>                      
        <option value="Watched">Watched</option>                                  
      </select>                                                                 
                                                                                  
      <label for="filter-genre">Genre:</label>              
      <select id="filter-genre">                                                
        <option value="all">All Genres</option>
      </select>                                                                   
   
      <label for="filter-level">Disturbance:</label>                              
      <select id="filter-level">                            
        <option value="all">All Levels</option>                                   
        <option value="1">Level 1 — safe for normies</option>
        <option value="2">Level 2 — horror fans only</option>                     
        <option value="3">Level 3 — ruining the party</option>
        <option value="4">Level 4 — disturbia freaks</option>                     
        <option value="5">Level 5 — medical attention</option>                    
      </select>                                                                   
                                                                                  
      <label for="sort-by">Sort:</label>                                          
      <select id="sort-by">                                                     
        <option value="added">Date Added</option>                                 
        <option value="disturb-asc">Disturbing ↑</option>   
        <option value="disturb-desc">Disturbing ↓</option>                        
        <option value="rating-desc">Rating ↓</option>
        <option value="title-asc">Title A–Z</option>                              
      </select>                                                                   
                                                                                  
      <div class="spacer"></div>                                                  
      <button class="btn-trigger-toggle" id="btn-triggers"                      
  onclick="toggleTriggerPanel()">⚠ My Triggers</button>                           
      <button class="btn-add" onclick="openModal()">+ Add Movie</button>
    </div>                                                                        
                                                            
    <div class="trigger-bar" id="trigger-bar">                                    
      <div class="trigger-bar-header">                      
        <div>                                                                   
          <h3>My "Don't Want to See" Triggers</h3>                                
          <p>Movies containing these tags will show a warning.</p>
        </div>                                                                    
      </div>                                                
      <div id="trigger-tag-grid"></div>                                           
    </div>                                                                        
                                                                                
    <div class="grid" id="movie-grid"></div>                                      
                                                            
    <div class="modal-overlay" id="modal-overlay">                                
      <div class="modal">
        <h2 id="modal-title">Add Movie</h2>                                       
        <form id="movie-form" onsubmit="saveMovie(event)">                        
          <input type="hidden" id="edit-id" />                                  
                                                                                  
          <div class="form-group">                          
            <label for="input-title">Title *</label>                              
            <input type="text" id="input-title" placeholder="e.g. Hereditary" 
  required />                                                                     
          </div>
                                                                                  
          <div class="form-group">                          
            <label for="input-year">Year</label>                                
            <input type="number" id="input-year" placeholder="e.g. 2018" 
  min="1888" max="2099" />                                                        
          </div>
                                                                                  
          <div class="form-group">                                                
            <label for="input-genre">Genre</label>                              
            <select id="input-genre">                                             
              <option value="">— Select —</option>          
              <option>Action</option>                                             
              <option>Adventure</option>
              <option>Animation</option>                                          
              <option>Comedy</option>                       
              <option>Crime</option>                                            
              <option>Documentary</option>                                        
              <option>Drama</option>
              <option>Fantasy</option>                                            
              <option>Horror</option>                       
              <option>Musical</option>                                          
              <option>Mystery</option>                                            
              <option>Romance</option>
              <option>Sci-Fi</option>                                             
              <option>Thriller</option>                     
              <option>Western</option>                                            
              <option>Other</option>
            </select>                                                             
          </div>                                            
                                                                                
          <div class="form-group">
            <label>Star Rating</label>
            <div class="star-input" id="star-input">                              
              <span data-val="1">★</span>
              <span data-val="2">★</span>                                         
              <span data-val="3">★</span>                   
              <span data-val="4">★</span>                                         
              <span data-val="5">★</span>                   
            </div>                                                                
            <input type="hidden" id="input-rating" value="0" />
          </div>                                                                  
                                                            
          <div class="form-group">                                                
            <label>Disturbance Level</label>
            <div class="disturb-level-picker" id="disturb-level-picker">          
              <button type="button" class="disturb-level-btn" data-level="1"><span
   class="lvl-num">1</span> safe for normies</button>                             
              <button type="button" class="disturb-level-btn" data-level="2"><span
   class="lvl-num">2</span> only if you actually like horror movies</button>      
              <button type="button" class="disturb-level-btn" data-level="3"><span
   class="lvl-num">3</span> now you're ruining the party for everyone</button>    
              <button type="button" class="disturb-level-btn" data-level="4"><span
   class="lvl-num">4</span> only for true disturbia freaks</button>               
              <button type="button" class="disturb-level-btn" data-level="5"><span
   class="lvl-num">5</span> you may need medical attention</button>               
            </div>                                          
            <div class="disturb-level-desc" id="disturb-level-desc"></div>        
            <input type="hidden" id="input-disturb-level" value="0" />            
          </div>                                                                  
                                                                                  
          <div class="form-group">                                                
            <label>Why It's Disturbing</label>                                  
            <div id="disturb-tag-grid"></div>                                     
            <input type="hidden" id="input-disturb-tags" value="[]" />
          </div>                                                                  
                                                            
          <div class="form-group">                                                
            <label for="input-status">Status *</label>      
            <select id="input-status" required>                                 
              <option value="Want to Watch">Want to Watch</option>                
              <option value="Watched">Watched</option>
            </select>                                                             
          </div>                                            
                                                                                  
          <div class="form-group">
            <label for="input-note">Note / Review</label>                         
            <textarea id="input-note" placeholder="Your thoughts, quotes, or 
  reasons to watch…"></textarea>                                                  
          </div>
                                                                                  
          <div class="form-actions">                                              
            <button type="button" class="btn-cancel"                            
  onclick="closeModal()">Cancel</button>                                          
            <button type="submit" class="btn-save">Save</button>
          </div>                                                                
        </form>                                                                   
      </div>
    </div>                                                                        
                                                            
    <script>                                                                    
      const STORAGE_KEY = 'mes-movie-list';
      const TRIGGERS_KEY = 'mes-movie-triggers';                                  
   
      const DISTURB_LEVELS = [                                                    
        '',                                                 
        'safe for normies',                                                       
        'only if you actually like horror movies',
        "now you're ruining the party for everyone",                              
        'only for true disturbia freaks',                   
        'you may need medical attention'                                          
      ];
                                                                                  
      const DISTURB_TAG_GROUPS = {                          
        'Violence & Harm': ['violent','sexual violence','body horror','disturbing 
  visuals','animal harm','child in peril','hostage','jump scares'],               
        'Psychological': ['descent into madness','psychological torture','not 
  being believed','gaslighting','too close to home','realistic','existential      
  dread'],                                                  
        'Emotional': ['made me sad','grief','traumy mommy','rug pulls','no        
  redemption arc'],                                                               
        'Social & Cultural': ['cults','taboo relationships','weird sex          
  stuff','based on true events','religious horror','cosmic horror'],              
      };                                                    
                                                                                  
      const ALL_DISTURB_TAGS = Object.values(DISTURB_TAG_GROUPS).flat();          
                                                                                
      let movies = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');         
      let myTriggers = new Set(JSON.parse(localStorage.getItem(TRIGGERS_KEY) ||
  '[]'));                                                                         
      let editingId = null;                                 
      let selectedRating = 0;                                                     
      let selectedDisturbLevel = 0;                                               
      let selectedTags = new Set();                                             
                                                                                  
      function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(movies));
   }                                                                            
      function saveTriggers() { localStorage.setItem(TRIGGERS_KEY,                
  JSON.stringify([...myTriggers])); }                       
                                                                                
      function render() {                                                         
        const statusFilter = document.getElementById('filter-status').value;
        const genreFilter  = document.getElementById('filter-genre').value;       
        const levelFilter  = document.getElementById('filter-level').value;
        const sortBy       = document.getElementById('sort-by').value;            
   
        const genres = [...new Set(movies.map(m =>                                
  m.genre).filter(Boolean))].sort();                        
        const genreSelect = document.getElementById('filter-genre');              
        const currentGenre = genreSelect.value;             
        genreSelect.innerHTML = '<option value="all">All Genres</option>';      
        genres.forEach(g => {                                                     
          const opt = document.createElement('option');
          opt.value = g; opt.textContent = g;                                     
          if (g === currentGenre) opt.selected = true;      
          genreSelect.appendChild(opt);                                           
        });                                                                       
                                                                                
        let filtered = movies.filter(m => {                                       
          const statusOk = statusFilter === 'all' || m.status === statusFilter;
          const genreOk  = genreFilter  === 'all' || m.genre  === genreFilter;    
          const levelOk  = levelFilter  === 'all' || (m.disturbLevel || 0) ===    
  parseInt(levelFilter);                                                          
          return statusOk && genreOk && levelOk;                                  
        });                                                                       
                                                                                
        filtered = [...filtered].sort((a, b) => {                                 
          if (sortBy === 'disturb-asc')  return (a.disturbLevel || 0) -
  (b.disturbLevel || 0);                                                          
          if (sortBy === 'disturb-desc') return (b.disturbLevel || 0) -
  (a.disturbLevel || 0);                                                          
          if (sortBy === 'rating-desc')  return (b.rating || 0) - (a.rating || 0);
          if (sortBy === 'title-asc')    return a.title.localeCompare(b.title);   
          return new Date(b.addedAt || 0) - new Date(a.addedAt || 0);             
        });                                                                       
                                                                                  
        const grid = document.getElementById('movie-grid');                       
        grid.innerHTML = '';                                                    
        if (filtered.length === 0) {                                              
          grid.innerHTML = '<div class="empty-state">No movies here yet — add one 
  above! 🍿</div>';                                                               
        } else {
          filtered.forEach(m => grid.appendChild(buildCard(m)));                  
        }                                                                         
                                                                                
        const watched = movies.filter(m => m.status === 'Watched');               
        const want    = movies.filter(m => m.status === 'Want to Watch');
        const rated   = watched.filter(m => m.rating > 0);                        
        const avg     = rated.length ? (rated.reduce((s, m) => s + m.rating, 0) /
  rated.length).toFixed(1) : '—';                                                 
                                                            
        document.getElementById('stat-total').textContent   = movies.length;      
        document.getElementById('stat-watched').textContent = watched.length;
        document.getElementById('stat-want').textContent    = want.length;      
        document.getElementById('stat-avg').textContent     = avg === '—' ? '—' : 
  avg + ' ★';                                                                     
      }                                                                           
                                                                                  
      function buildCard(m) {                                                   
        const card = document.createElement('div');                             
        card.className = 'card';
        const starsHtml = [1,2,3,4,5].map(i => `<span class="${i <= m.rating ? '' 
  : 'empty'}">★</span>`).join('');                                                
        const statusClass = m.status === 'Watched' ? 'badge-watched' :            
  'badge-want';                                                                   
        const noteHtml   = m.note ? `<div                                       
  class="card-note">${escHtml(m.note)}</div>` : '';                               
        const genreBadge = m.genre ? `<span class="badge    
  badge-genre">${escHtml(m.genre)}</span>` : '';                                  
        const disturbHtml = m.disturbLevel > 0 ? `          
          <div class="card-disturb">                                              
            <span class="disturb-skull">☠</span>            
            <span class="disturb-level-label">Level ${m.disturbLevel}:</span>     
            <span class="disturb-level-desc-card">${escHtml(DISTURB_LEVELS[m.distu
  rbLevel])}</span>                                                               
          </div>` : '';                                                           
        const tags = Array.isArray(m.disturbTags) ? m.disturbTags : [];           
        const tagsHtml = tags.length ? `<div class="card-tags">${tags.map(t =>    
  `<span class="tag-pill">${escHtml(t)}</span>`).join('')}</div>` : '';           
        const triggeredTags = tags.filter(t => myTriggers.has(t));                
        const triggerHtml = triggeredTags.length ? `<div                          
  class="card-trigger-warning">⚠ Contains your triggers:                          
  ${triggeredTags.map(escHtml).join(', ')}</div>` : '';                           
                                                                                  
        card.innerHTML = `                                                        
          <div class="card-header"><div>                                        
            <div class="card-title">${escHtml(m.title)}</div>                     
            <div class="card-year">${m.year || ''}</div>    
          </div></div>                                                            
          <div class="card-meta">${genreBadge}<span class="badge
  ${statusClass}">${escHtml(m.status)}</span></div>                               
          ${m.rating > 0 ? `<div class="stars">${starsHtml}</div>` : ''}
          ${disturbHtml}${triggerHtml}${tagsHtml}${noteHtml}                      
          <div class="card-actions">                                              
            <button class="btn-sm" onclick="editMovie('${m.id}')">Edit</button> 
            <button class="btn-sm danger"                                         
  onclick="deleteMovie('${m.id}')">Remove</button>                                
          </div>`;                                                                
        return card;                                                              
      }                                                                         
                                                                                
      function escHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g
  ,'&gt;').replace(/"/g,'&quot;');                                                
      }
                                                                                  
      function buildTagGrid() {                                                   
        const container = document.getElementById('disturb-tag-grid');          
        container.innerHTML = '';                                                 
        Object.entries(DISTURB_TAG_GROUPS).forEach(([groupName, tags]) => {
          const section = document.createElement('div');                          
          section.className = 'disturb-tag-section';
          const label = document.createElement('div');                            
          label.className = 'disturb-tag-section-label';                          
          label.textContent = groupName;                                        
          section.appendChild(label);                                             
          const grid = document.createElement('div');       
          grid.className = 'disturb-tag-grid';                                    
          tags.forEach(tag => {
            const btn = document.createElement('button');                         
            btn.type = 'button';                            
            btn.className = 'disturb-tag-btn' + (selectedTags.has(tag) ? '        
  selected' : '');
            btn.textContent = tag;                                                
            btn.addEventListener('click', () => {           
              if (selectedTags.has(tag)) { selectedTags.delete(tag);              
  btn.classList.remove('selected'); }                                             
              else { selectedTags.add(tag); btn.classList.add('selected'); }      
              document.getElementById('input-disturb-tags').value =               
  JSON.stringify([...selectedTags]);                                              
            });                                                                 
            grid.appendChild(btn);                                                
          });                                               
          section.appendChild(grid);                                            
          container.appendChild(section);
        });
      }
                                                                                  
      function setDisturbLevelUI(val) {
        selectedDisturbLevel = val;                                               
        document.getElementById('input-disturb-level').value = val;               
        document.querySelectorAll('.disturb-level-btn').forEach(b => {          
          b.classList.toggle('selected', parseInt(b.dataset.level) === val);      
        });                                                                       
      }                                                                         
                                                                                  
      document.getElementById('disturb-level-picker').addEventListener('click', e 
  => {                                                                          
        const btn = e.target.closest('.disturb-level-btn');                       
        if (!btn) return;                                   
        const val = parseInt(btn.dataset.level);                                  
        setDisturbLevelUI(selectedDisturbLevel === val ? 0 : val);
      });                                                                         
                                                            
      function openModal(movie) {                                                 
        document.getElementById('modal-overlay').classList.add('open');
        document.getElementById('modal-title').textContent = movie ? 'Edit Movie' 
  : 'Add Movie';                                                                  
        if (movie) {                                                            
          editingId = movie.id;                                                   
          document.getElementById('edit-id').value      = movie.id;
          document.getElementById('input-title').value  = movie.title;          
          document.getElementById('input-year').value   = movie.year || '';       
          document.getElementById('input-genre').value  = movie.genre || '';
          document.getElementById('input-status').value = movie.status;           
          document.getElementById('input-note').value   = movie.note || '';
          setStarUI(movie.rating || 0);                                           
          setDisturbLevelUI(movie.disturbLevel || 0);                             
          selectedTags = new Set(Array.isArray(movie.disturbTags) ?             
  movie.disturbTags : []);                                                        
        } else {                                            
          editingId = null;                                                       
          document.getElementById('movie-form').reset();    
          setStarUI(0);                                                           
          setDisturbLevelUI(0);
          selectedTags = new Set();                                               
        }                                                   
        buildTagGrid();                                                         
        document.getElementById('input-disturb-tags').value =                     
  JSON.stringify([...selectedTags]);
      }                                                                           
                                                            
      function closeModal() {                                                   
        document.getElementById('modal-overlay').classList.remove('open');
        editingId = null;                                                         
      }
                                                                                  
      document.getElementById('modal-overlay').addEventListener('click',
  function(e) {                                                                 
        if (e.target === this) closeModal();
      });                                                                         
   
      function setStarUI(val) {                                                   
        selectedRating = val;                               
        document.getElementById('input-rating').value = val;                    
        document.querySelectorAll('#star-input span').forEach(s => {              
          s.classList.toggle('on', parseInt(s.dataset.val) <= val);
        });                                                                       
      }                                                     
                                                                                  
      document.querySelectorAll('#star-input span').forEach(s => {
        s.addEventListener('click', () => setStarUI(parseInt(s.dataset.val)));  
        s.addEventListener('mouseover', () => {                                   
          document.querySelectorAll('#star-input span').forEach(x => {
            x.classList.toggle('on', parseInt(x.dataset.val) <=                   
  parseInt(s.dataset.val));                                                       
          });                                                                     
        });                                                                       
        s.addEventListener('mouseout', () => setStarUI(selectedRating));        
      });                                                                       

      function saveMovie(e) {                                                     
        e.preventDefault();
        const title        = document.getElementById('input-title').value.trim(); 
        const year         = document.getElementById('input-year').value.trim();
        const genre        = document.getElementById('input-genre').value;        
        const rating       =
  parseInt(document.getElementById('input-rating').value) || 0;                   
        const disturbLevel =                                
  parseInt(document.getElementById('input-disturb-level').value) || 0;            
        const disturbTags  =
  JSON.parse(document.getElementById('input-disturb-tags').value || '[]');        
        const status       = document.getElementById('input-status').value;
        const note         = document.getElementById('input-note').value.trim();  
        if (!title) return;                                 
        if (editingId) {                                                          
          const idx = movies.findIndex(m => m.id === editingId);
          if (idx > -1) movies[idx] = { ...movies[idx], title, year, genre,       
  rating, disturbLevel, disturbTags, status, note };                              
        } else {                                                                
          movies.push({ id: crypto.randomUUID(), title, year, genre, rating,      
  disturbLevel, disturbTags, status, note, addedAt: new Date().toISOString() });  
        }                                                                       
        save(); closeModal(); render();                                           
      }                                                     
                                                                                
      function editMovie(id) {                                                    
        const movie = movies.find(m => m.id === id);
        if (movie) openModal(movie);                                              
      }                                                     
                                                                                  
      function deleteMovie(id) {
        if (!confirm('Remove this movie from your list?')) return;                
        movies = movies.filter(m => m.id !== id);           
        save(); render();                                                         
      }
                                                                                  
      function toggleTriggerPanel() {                       
        const bar = document.getElementById('trigger-bar');                     
        const btn = document.getElementById('btn-triggers');
        const isOpen = bar.classList.toggle('open');                              
        btn.classList.toggle('active', isOpen);
        if (isOpen) buildTriggerGrid();                                           
      }                                                     
                                                                                  
      function buildTriggerGrid() {                         
        const container = document.getElementById('trigger-tag-grid');          
        container.innerHTML = '';                                                 
        Object.entries(DISTURB_TAG_GROUPS).forEach(([groupName, tags]) => {
          const section = document.createElement('div');                          
          section.className = 'disturb-tag-section';        
          const label = document.createElement('div');                            
          label.className = 'disturb-tag-section-label';
          label.textContent = groupName;                                          
          section.appendChild(label);                       
          const grid = document.createElement('div');                           
          grid.className = 'disturb-tag-grid';                                    
          tags.forEach(tag => {
            const btn = document.createElement('button');                         
            btn.type = 'button';                            
            btn.className = 'disturb-tag-btn' + (myTriggers.has(tag) ? ' selected'
   : '');                                                                         
            btn.textContent = tag;
            btn.addEventListener('click', () => {                                 
              if (myTriggers.has(tag)) { myTriggers.delete(tag);
  btn.classList.remove('selected'); }                                             
              else { myTriggers.add(tag); btn.classList.add('selected'); }
              saveTriggers(); render();                                           
            });                                                                   
            grid.appendChild(btn);                                              
          });                                                                     
          section.appendChild(grid);                        
          container.appendChild(section);                                       
        });
      }

      document.getElementById('filter-status').addEventListener('change', render);
      document.getElementById('filter-genre').addEventListener('change', render);
      document.getElementById('filter-level').addEventListener('change', render); 
      document.getElementById('sort-by').addEventListener('change', render);
                                                                                  
      render();
    </script>                                                                     
  </body>                                                   
  </html>
